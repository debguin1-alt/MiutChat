name = "miut"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "MIUT_RL"
id      = "REPLACE_WITH_YOUR_MIUT_RL_ID"

[[kv_namespaces]]
binding = "MIUT_BAN"
id      = "REPLACE_WITH_YOUR_MIUT_BAN_ID"

[vars]
MIUT_VERSION  = "3.0.0"
MIUT_ENV      = "production"
RL_CREATE_MAX = "5"
RL_CREATE_WIN_S = "30"
RL_ENTER_MAX  = "10"
RL_ENTER_WIN_S = "60"
RL_SEND_MAX   = "30"
RL_SEND_WIN_S = "10"
