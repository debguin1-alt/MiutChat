<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — Page Not Found · MiutChat</title>
<meta name="description" content="The page you're looking for doesn't exist. MiutChat — anonymous end-to-end encrypted chat."/>
<meta name="robots" content="noindex"/>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--t:#4ecdc4;--t2:#39bdb4;--bg:#050d0c;--bg2:#091413;--g2:rgba(12,22,21,.88);--bdr:rgba(78,205,196,.12);--tb:rgba(78,205,196,.17);--tx:#cdeae7;--tx2:#4e7a77;--fui:'Syne',sans-serif;--fm:'Space Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fm);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 6%;text-align:center;position:relative;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--bdr) 1px,transparent 1px),linear-gradient(90deg,var(--bdr) 1px,transparent 1px);background-size:58px 58px;opacity:.22;pointer-events:none}
.glow{position:absolute;inset:0;background:radial-gradient(ellipse 60% 55% at 50% 50%,rgba(78,205,196,.07) 0%,transparent 65%);pointer-events:none}
.code{font-family:var(--fui);font-size:clamp(5rem,18vw,9rem);font-weight:800;color:transparent;-webkit-text-stroke:2px rgba(78,205,196,.3);letter-spacing:-4px;line-height:1;position:relative;z-index:1}
.code span{-webkit-text-stroke:0;background:linear-gradient(135deg,var(--t),var(--t2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.label{font-family:var(--fui);font-size:.6rem;font-weight:700;letter-spacing:5px;color:var(--t);margin:24px 0 14px;position:relative;z-index:1}
h1{font-family:var(--fui);font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:#fff;margin-bottom:14px;position:relative;z-index:1}
p{font-family:var(--fm);font-size:.78rem;color:var(--tx2);line-height:1.85;max-width:440px;margin-bottom:36px;position:relative;z-index:1}
.actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.btn-p{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,var(--t),var(--t2));color:var(--bg);font-family:var(--fui);font-size:.75rem;font-weight:800;letter-spacing:2px;border-radius:14px;text-decoration:none;transition:transform .18s,box-shadow .18s;box-shadow:0 4px 20px rgba(78,205,196,.28)}
.btn-p:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 32px rgba(78,205,196,.44)}
.btn-s{display:inline-flex;align-items:center;gap:8px;padding:13px 22px;background:transparent;color:var(--tx2);font-family:var(--fui);font-size:.72rem;font-weight:700;letter-spacing:2px;border-radius:14px;border:1px solid var(--bdr);text-decoration:none;transition:border-color .14s,color .14s,background .14s}
.btn-s:hover{border-color:var(--tb);color:var(--t);background:rgba(78,205,196,.06)}
.nav{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;padding:0 6%;background:rgba(5,13,12,.84);border-bottom:1px solid var(--bdr);backdrop-filter:blur(20px);z-index:100;gap:12px}
.nav img{width:30px;height:30px;border-radius:9px}
.nav span{font-family:var(--fui);font-size:.85rem;font-weight:800;letter-spacing:5px;color:#fff}
</style>
</head>
<body>
<nav class="nav">
  <img src="/icons/icon-192.png" alt="MiutChat"/>
  <span>MIUT</span>
</nav>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="code">4<span>0</span>4</div>
<div class="label">PAGE NOT FOUND</div>
<h1>Nothing to see here.</h1>
<p>The page you're looking for doesn't exist or has been moved. Rooms self-destruct — maybe this page did too.</p>
<div class="actions">
  <a href="/index.html" class="btn-p">
    <svg viewBox="0 0 20 20" fill="none" width="14" height="14"><path d="M17.5 2.5L9 11M17.5 2.5L12 17.5l-3-6.5-6.5-3L17.5 2.5Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Launch App
  </a>
  <a href="/landing.html" class="btn-s">Home</a>
</div>
</body>
</html>
