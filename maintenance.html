<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Maintenance — MiutChat</title>
<meta name="description" content="MiutChat is currently undergoing maintenance. We'll be back soon."/>
<meta name="robots" content="noindex,nofollow"/>
<meta http-equiv="refresh" content="60"/>
<meta name="theme-color" content="#050d0c"/>
<link rel="icon" type="image/png" href="/icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{--t:#4ecdc4;--t2:#39bdb4;--bg:#050d0c;--bg2:#091413;--bdr:rgba(78,205,196,.12);--tb:rgba(78,205,196,.17);--tdim:rgba(78,205,196,.08);--tx:#cdeae7;--tx2:#4e7a77;--fui:'Syne',sans-serif;--fm:'Space Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fm);-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 6%;text-align:center;position:relative;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(var(--bdr) 1px,transparent 1px),linear-gradient(90deg,var(--bdr) 1px,transparent 1px);background-size:58px 58px;opacity:.22;pointer-events:none;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 75%)}
.glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 50% at 50% 50%,rgba(78,205,196,.08) 0%,transparent 65%);pointer-events:none}
.card{position:relative;z-index:1;max-width:520px;padding:52px 44px;background:rgba(12,22,21,.88);border:1px solid var(--bdr);border-radius:28px;backdrop-filter:blur(24px)}
.icon-wrap{width:72px;height:72px;border-radius:20px;background:var(--tdim);border:1px solid var(--tb);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;position:relative}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-ring{width:48px;height:48px;border:2.5px solid rgba(78,205,196,.15);border-top-color:var(--t);border-radius:50%;animation:spin 1.4s linear infinite}
.label{font-family:var(--fui);font-size:.58rem;font-weight:700;letter-spacing:5px;color:var(--t);margin-bottom:16px}
h1{font-family:var(--fui);font-size:clamp(1.4rem,4vw,1.9rem);font-weight:800;color:#fff;line-height:1.14;margin-bottom:14px}
p{font-family:var(--fm);font-size:.76rem;color:var(--tx2);line-height:1.88;margin-bottom:22px}
.badge{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:var(--tdim);border:1px solid var(--tb);border-radius:100px;font-family:var(--fui);font-size:.6rem;font-weight:700;letter-spacing:2px;color:var(--t);margin-bottom:10px}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--t);box-shadow:0 0 8px var(--t);animation:pd 1.6s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
.auto{font-size:.6rem;color:var(--tx2);letter-spacing:.5px;margin-top:6px}
.nav{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;padding:0 6%;background:rgba(5,13,12,.84);border-bottom:1px solid var(--bdr);backdrop-filter:blur(20px);z-index:100;gap:12px}
.nav img{width:30px;height:30px;border-radius:9px}
.nav span{font-family:var(--fui);font-size:.85rem;font-weight:800;letter-spacing:5px;color:#fff}
#countdown{color:var(--t);font-weight:700}
</style>
</head>
<body>
<nav class="nav">
  <img src="/icons/icon-192.png" alt="MiutChat"/>
  <span>MIUT</span>
</nav>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="card">
  <div class="icon-wrap"><div class="spin-ring"></div></div>
  <div class="label">MAINTENANCE</div>
  <h1>We'll be back soon.</h1>
  <p>MiutChat is currently undergoing scheduled maintenance to improve reliability and security. We apologise for the inconvenience.</p>
  <div class="badge"><span class="pulse"></span>TECHNICAL ISSUE IN PROGRESS</div>
  <p style="font-size:.68rem;margin-top:12px;margin-bottom:0">This page refreshes automatically in <span id="countdown">60</span>s.</p>
</div>
<script>
(function(){
  var t=60,el=document.getElementById('countdown');
  setInterval(function(){t--;if(el)el.textContent=t;if(t<=0)location.reload();},1000);
})();
</script>
</body>
</html>
